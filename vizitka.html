<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Нязик Тач — Создательница «Бабушки Анны»</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080a05;
      --card: #0d1009;
      --border: rgba(255,255,255,0.07);
      --p1: #f59e0b;
      --p2: #4ade80;
      --p3: #86efac;
      --text: #f1f5f9;
      --muted: #94a3b8;
    }

    html, body { height: 100%; overflow-x: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    /* ── ambient blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(110px);
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(245,158,11,0.2), transparent 70%);
      top: -160px; left: -160px;
      animation: blobDrift1 13s ease-in-out infinite alternate;
    }
    .blob-2 {
      width: 380px; height: 380px;
      background: radial-gradient(circle, rgba(74,222,128,0.15), transparent 70%);
      bottom: -120px; right: -100px;
      animation: blobDrift2 16s ease-in-out infinite alternate;
    }
    .blob-3 {
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(251,191,36,0.1), transparent 70%);
      top: 50%; right: 5%;
      animation: blobDrift3 10s ease-in-out infinite alternate;
    }
    @keyframes blobDrift1 { from { transform: translate(0,0); }  to { transform: translate(60px, 50px); } }
    @keyframes blobDrift2 { from { transform: translate(0,0); }  to { transform: translate(-50px,-40px); } }
    @keyframes blobDrift3 { from { transform: translate(0,0); }  to { transform: translate(30px,-30px); } }

    /* ── particles ── */
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .pt {
      position: absolute; border-radius: 50%;
      background: var(--p1); opacity: 0;
      animation: ptFloat linear infinite;
    }
    @keyframes ptFloat {
      0%   { transform: translateY(105vh) scale(0); opacity: 0; }
      8%   { opacity: 0.45; }
      92%  { opacity: 0.15; }
      100% { transform: translateY(-5vh) scale(1); opacity: 0; }
    }

    /* ── card ── */
    .page {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      width: 100%;
    }
    .card {
      width: 100%; max-width: 440px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 52px 44px 44px;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(245,158,11,0.04),
        0 32px 80px rgba(0,0,0,0.65),
        0 0 120px rgba(245,158,11,0.05) inset;
      animation: cardIn 0.8s cubic-bezier(0.22,1,0.36,1) both;
      will-change: transform;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }

    /* ── avatar ── */
    .avatar-wrap {
      display: flex; justify-content: center;
      margin-bottom: 24px;
    }
    .avatar {
      position: relative;
      width: 100px; height: 100px;
    }
    .avatar-ring {
      position: absolute; inset: -3px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #f59e0b, #4ade80, #86efac, #fbbf24, #f59e0b);
      animation: ringSpın 7s linear infinite;
      z-index: 0;
    }
    .avatar-ring-outer {
      position: absolute; inset: -9px;
      border-radius: 50%;
      background: conic-gradient(from 180deg, transparent 60%, rgba(245,158,11,0.25) 72%, transparent 85%);
      animation: ringSpın 11s linear infinite reverse;
    }
    @keyframes ringSpın { to { transform: rotate(360deg); } }
    .avatar-face {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: linear-gradient(145deg, #1a1a0e, #0d1009);
      border: 2px solid var(--card);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem;
      z-index: 1;
      box-shadow: 0 0 28px rgba(245,158,11,0.15) inset;
    }

    /* ── name ── */
    .name-wrap { position: relative; margin-bottom: 8px; }
    .name-halo {
      position: absolute; inset: -16px;
      background: radial-gradient(ellipse at center, rgba(245,158,11,0.18) 0%, transparent 68%);
      filter: blur(6px);
      animation: haloPulse 3.5s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes haloPulse {
      0%,100% { opacity: 0.7; transform: scale(1); }
      50%      { opacity: 1;   transform: scale(1.06); }
    }
    .name {
      position: relative;
      font-size: clamp(2rem, 8vw, 2.7rem);
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.1;
      background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 45%, #4ade80 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: nameShimmer 5s ease-in-out infinite;
    }
    @keyframes nameShimmer {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    /* ── divider ── */
    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 14px 0 10px;
    }
    .div-line { flex:1; height:1px; background: linear-gradient(90deg, transparent, rgba(245,158,11,0.25), transparent); }
    .div-gem  { width:5px; height:5px; border-radius:50%; background:var(--p1); box-shadow:0 0 8px var(--p1); opacity:0.7; }

    /* ── specialization ── */
    .spec {
      font-size: 0.8rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      animation: fadeUp 0.8s 0.35s ease both;
    }
    .spec em { font-style: normal; color: rgba(251,191,36,0.65); }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:none; }
    }

    /* ── bio ── */
    .bio {
      margin: 22px 0;
      padding: 16px 18px;
      background: rgba(245,158,11,0.04);
      border: 1px solid rgba(245,158,11,0.1);
      border-radius: 14px;
      font-size: 0.9rem;
      line-height: 1.75;
      color: rgba(241,245,249,0.65);
      animation: fadeUp 0.8s 0.45s ease both;
    }

    /* ── socials ── */
    .socials {
      display: flex; justify-content: center; gap: 14px;
      margin: 20px 0;
      animation: fadeUp 0.8s 0.55s ease both;
    }
    .soc {
      width: 50px; height: 50px;
      border-radius: 15px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1),
                  background 0.25s, border-color 0.25s, color 0.25s, box-shadow 0.25s;
    }
    .soc::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 120%, rgba(255,255,255,0.1), transparent 70%);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .soc:hover { transform: translateY(-5px) scale(1.1); }
    .soc:hover::before { opacity: 1; }
    .soc svg { position: relative; z-index: 1; width: 22px; height: 22px; }

    .soc.tg:hover { color:#29b6f6; border-color:rgba(41,182,246,0.45);  box-shadow:0 8px 26px rgba(41,182,246,0.28); }
    .soc.ig:hover { color:#f472b6; border-color:rgba(244,114,182,0.45); box-shadow:0 8px 26px rgba(244,114,182,0.28); }
    .soc.tk:hover { color:#f1f1f1; border-color:rgba(241,241,241,0.35); box-shadow:0 8px 26px rgba(241,241,241,0.2); }
    .soc.yt:hover { color:#f87171; border-color:rgba(248,113,113,0.45); box-shadow:0 8px 26px rgba(248,113,113,0.28); }

    /* tooltips */
    [data-tip] { position: relative; }
    [data-tip]::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 9px);
      left: 50%; transform: translateX(-50%) translateY(4px);
      background: rgba(15,15,19,0.96);
      color: var(--p1);
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      padding: 4px 10px;
      border-radius: 7px;
      border: 1px solid rgba(245,158,11,0.2);
      white-space: nowrap;
      opacity: 0; pointer-events: none;
      transition: all 0.2s;
    }
    [data-tip]:hover::after {
      opacity: 1; transform: translateX(-50%) translateY(0);
    }

    /* ── CTA ── */
    .cta-wrap {
      animation: fadeUp 0.8s 0.65s ease both;
      position: relative;
    }
    .cta-aura {
      position: absolute;
      inset: -10px;
      border-radius: 60px;
      background: radial-gradient(ellipse, rgba(245,158,11,0.22), transparent 65%);
      animation: ctaAura 3s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes ctaAura {
      0%,100% { transform: scale(1); opacity: 0.6; }
      50%      { transform: scale(1.07); opacity: 1; }
    }
    .cta {
      position: relative;
      display: inline-flex; align-items: center; justify-content: center; gap: 9px;
      width: 100%;
      padding: 15px 24px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 50%, #4ade80 100%);
      background-size: 200% 200%;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-decoration: none;
      cursor: pointer;
      overflow: hidden;
      box-shadow: 0 4px 22px rgba(245,158,11,0.38);
      animation: ctaGradient 5s ease-in-out infinite alternate;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
    }
    @keyframes ctaGradient {
      0%   { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }
    .cta::before {
      content: '';
      position: absolute;
      top: -50%; left: -65%;
      width: 38%; height: 200%;
      background: rgba(255,255,255,0.22);
      transform: skewX(-22deg);
      animation: ctaSheen 3.5s ease-in-out infinite;
    }
    @keyframes ctaSheen {
      0%   { left: -65%; }
      100% { left: 135%; }
    }
    .cta:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 36px rgba(245,158,11,0.52);
    }
    .cta:active { transform: translateY(0) scale(0.98); }
    .cta svg { flex-shrink: 0; }

    /* ── footer ── */
    .footer {
      margin-top: 22px;
      font-size: 0.74rem;
      color: rgba(148,163,184,0.35);
      letter-spacing: 0.09em;
      animation: fadeUp 0.8s 0.75s ease both;
    }
    .footer a {
      color: rgba(251,191,36,0.35);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer a:hover { color: rgba(251,191,36,0.7); }

    @media (max-width: 480px) {
      .card { padding: 38px 26px 34px; border-radius: 22px; }
      .soc  { width: 46px; height: 46px; }
    }
  </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="particles" id="particles"></div>

<div class="page">
  <div class="card">

    <!-- Avatar -->
    <div class="avatar-wrap">
      <div class="avatar">
        <div class="avatar-ring-outer"></div>
        <div class="avatar-ring"></div>
        <div class="avatar-face">🌿</div>
      </div>
    </div>

    <!-- Name -->
    <div class="name-wrap">
      <div class="name-halo"></div>
      <h1 class="name">Нязик Тач</h1>
    </div>

    <!-- Divider -->
    <div class="divider">
      <div class="div-line"></div>
      <div class="div-gem"></div>
      <div class="div-line"></div>
    </div>

    <!-- Specialization -->
    <p class="spec"><em>✦</em>&nbsp;digital creator&nbsp;<em>✦</em></p>

    <!-- Bio -->
    <div class="bio">
      ✦ Создательница «Бабушки Анны»<br>
      ✦ Вайб-кодинг без программирования<br>
      ✦ Помогаю запускать ИИ-продукты за 1 день
    </div>

    <!-- Social icons -->
    <div class="socials">

      <!-- Telegram -->
      <a class="soc tg" href="https://t.me/njasik_touch" target="_blank" rel="noopener" data-tip="Telegram">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M11.994 2C6.475 2 2 6.477 2 12s4.475 10 9.994 10C17.52 22 22 17.523 22 12S17.52 2 11.994 2zm4.912 6.86-1.91 9.01c-.144.637-.52.793-1.054.494l-2.92-2.152-1.406 1.353c-.156.156-.288.288-.59.288l.21-2.974 5.41-4.887c.235-.21-.051-.326-.366-.116l-6.687 4.21-2.879-.9c-.626-.196-.638-.626.13-.927l11.233-4.33c.52-.19.978.126.829.93z"/>
        </svg>
      </a>

      <!-- Instagram -->
      <a class="soc ig" href="https://www.instagram.com/aibabushka40/" target="_blank" rel="noopener" data-tip="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
        </svg>
      </a>

      <!-- TikTok -->
      <a class="soc tk" href="https://www.tiktok.com/@aibabushka40" target="_blank" rel="noopener" data-tip="TikTok">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.23 8.23 0 0 0 4.83 1.55V6.79a4.85 4.85 0 0 1-1.06-.1z"/>
        </svg>
      </a>

      <!-- YouTube -->
      <a class="soc yt" href="https://www.youtube.com/@aibabushka40" target="_blank" rel="noopener" data-tip="YouTube">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="4"/>
          <polygon points="10,8 16,12 10,16" fill="currentColor" stroke="none"/>
        </svg>
      </a>

    </div>

    <!-- CTA -->
    <div class="cta-wrap">
      <div class="cta-aura"></div>
      <a class="cta" href="https://t.me/njasik_touch" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M11.994 2C6.475 2 2 6.477 2 12s4.475 10 9.994 10C17.52 22 22 17.523 22 12S17.52 2 11.994 2zm4.912 6.86-1.91 9.01c-.144.637-.52.793-1.054.494l-2.92-2.152-1.406 1.353c-.156.156-.288.288-.59.288l.21-2.974 5.41-4.887c.235-.21-.051-.326-.366-.116l-6.687 4.21-2.879-.9c-.626-.196-.638-.626.13-.927l11.233-4.33c.52-.19.978.126.829.93z"/>
        </svg>
        Написать мне
      </a>
    </div>

    <!-- Footer -->
    <p class="footer"><a href="https://t.me/njasik_touch">@njasik_touch</a></p>

  </div>
</div>

<script>
  const container = document.getElementById('particles');
  const colors = ['#f59e0b','#fbbf24','#4ade80','#86efac'];
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'pt';
    const s = Math.random() * 3 + 1;
    p.style.cssText = `
      width:${s}px; height:${s}px;
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${Math.random()*16+10}s;
      animation-delay:${Math.random()*14}s;
      filter:blur(${s>2.5?1:0}px);
    `;
    container.appendChild(p);
  }

  const card = document.querySelector('.card');
  if (window.matchMedia('(hover: hover)').matches) {
    document.addEventListener('mousemove', e => {
      const r = card.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const dx = (e.clientX - cx) / (window.innerWidth / 2);
      const dy = (e.clientY - cy) / (window.innerHeight / 2);
      card.style.transform = `perspective(900px) rotateY(${dx*4}deg) rotateX(${-dy*3}deg)`;
    });
    document.addEventListener('mouseleave', () => { card.style.transform = ''; });
  }
</script>
</body>
</html>
